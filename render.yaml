
services:
  - type: web
    name: studynova
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: STUDYNOVA_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: studynova-db
          property: connectionString

databases:
  - name: studynova-db
    databaseName: studynova
    user: studynova
    plan: free
