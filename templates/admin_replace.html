{% extends 'admin_dashboard.html' %}

{% block admin_content %}
<div class="glass-card p-4">
    <h4 class="mb-4"><i class="fas fa-exchange-alt"></i> Replace Note File</h4>
    <div class="mb-3">
        <strong>Current Note:</strong> {{ note.title }}<br>
        <strong>Current File:</strong> {% if note.cloudinary_public_id %}Cloudinary File{% else %}Local File{% endif %}
    </div>
    <form action="{{ url_for('admin_replace_note', note_id=note.id) }}" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
        <div class="row g-3">
            <div class="col-md-12">
                <label class="form-label">New File</label>
                <input type="file" name="file" class="form-control" accept=".pdf,.doc,.docx,.ppt,.pptx,.jpg,.jpeg,.png" required>
            </div>
            <div class="col-md-12 text-center mt-3">
                <a href="{{ url_for('admin_notes') }}" class="btn btn-outline-secondary me-2">Cancel</a>
                <button type="submit" class="btn btn-warning">Replace File</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
