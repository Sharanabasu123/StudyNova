{% extends 'admin_dashboard.html' %}

{% block title %}Add Resource - Admin - StudyNova{% endblock %}

{% block admin_content %}
<h2 class="mb-4">Add Resource to {{ topic.name }}</h2>
<form method="POST" enctype="multipart/form-data" class="glass-card p-4">
    <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" class="form-control" id="title" name="title" required>
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
    </div>
    <div class="mb-3">
        <label for="resource_type" class="form-label">Resource Type</label>
        <select class="form-select" id="resource_type" name="resource_type" required>
            <option value="Notes">Notes</option>
            <option value="PDF">PDF</option>
            <option value="Question Banks">Question Banks</option>
            <option value="Previous Year Papers">Previous Year Papers</option>
            <option value="Passing Package">Passing Package</option>
            <option value="Solutions">Solutions</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="file" class="form-label">File</label>
        <input type="file" class="form-control" id="file" name="file" required>
    </div>
    <button type="submit" class="btn btn-primary">Add Resource</button>
    <a href="{{ url_for('competitive_exams_topic', topic_id=topic.id) }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>
{% endblock %}
