<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - StudyNova</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <img src="{{ url_for('static', filename='images/Studynovalogo.jpeg') }}" class="bg-logo-watermark" alt="">

    <div class="auth-container auth-container-sm" data-aos="zoom-in">
        <div class="auth-form-side">
            <div class="text-center mb-4">
                <img src="{{ url_for('static', filename='images/Studynovalogo.jpeg') }}" alt="StudyNova Logo" class="auth-mini-logo">
                <h2>Reset Password</h2>
                <p class="text-muted mb-0">Enter your new password below.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <div class="auth-alerts">
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                </div>
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('reset_password', token=token) }}" method="POST" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control bg-light border-start-0" placeholder="New password" required minlength="6">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm New Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-shield-alt text-muted"></i></span>
                        <input type="password" name="confirm_password" class="form-control bg-light border-start-0" placeholder="Confirm password" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Update Password</button>
            </form>

            <div class="auth-footer">
                <p><a href="/login" class="text-primary text-decoration-none fw-bold">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
