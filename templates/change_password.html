{% extends 'layout.html' %}

{% block title %}Change Password - StudyNova{% endblock %}

{% block content %}
<section class="page-header py-5 bg-primary text-white text-center" style="background: linear-gradient(135deg, #4361ee 0%, #7209b7 100%);">
    <div class="container">
        <h1 data-aos="fade-down">
            <i class="fas fa-key me-2"></i>Change Password
        </h1>
    </div>
</section>

<section class="password-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6" data-aos="fade-up">
                <div class="glass-card p-5">
                    <form method="POST" action="{{ url_for('profile_change_password') }}">
                        <div class="mb-4">
                            <label class="form-label">Current Password <span class="text-danger">*</span></label>
                            <input type="password" name="current_password" class="form-control" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">New Password <span class="text-danger">*</span></label>
                            <input type="password" name="new_password" class="form-control" required>
                        </div>
                        
                        <div class="mb-5">
                            <label class="form-label">Confirm New Password <span class="text-danger">*</span></label>
                            <input type="password" name="confirm_password" class="form-control" required>
                        </div>
                        
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn btn-primary px-5">
                                <i class="fas fa-save me-2"></i>Change Password
                            </button>
                            <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary px-5">
                                <i class="fas fa-arrow-left me-2"></i>Back to Profile
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
