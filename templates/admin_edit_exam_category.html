{% extends 'admin_dashboard.html' %}

{% block title %}Edit Category - Admin - StudyNova{% endblock %}

{% block admin_content %}
<h2 class="mb-4">Edit Exam Category</h2>
<form method="POST" class="glass-card p-4">
    <div class="mb-3">
        <label for="name" class="form-label">Category Name</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ category.name }}" required>
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ category.description if category.description else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Update Category</button>
    <a href="{{ url_for('admin_competitive_exams') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>
{% endblock %}
