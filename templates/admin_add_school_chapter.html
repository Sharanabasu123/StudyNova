{% extends 'admin_dashboard.html' %}

{% block title %}Add Chapter - Admin - StudyNova{% endblock %}

{% block admin_content %}
<h2 class="mb-4">Add Chapter to {{ subject.name }}</h2>
<form method="POST" class="glass-card p-4">
    <div class="mb-3">
        <label for="name" class="form-label">Chapter Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <div class="mb-3">
        <label for="chapter_number" class="form-label">Chapter Number</label>
        <input type="number" class="form-control" id="chapter_number" name="chapter_number">
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Add Chapter</button>
    <a href="{{ url_for('school_notes_subject', subject_id=subject.id) }}" class="btn btn-outline-secondary ms-2">Cancel</a>
</form>
{% endblock %}
